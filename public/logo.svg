  </defs>
  <rect width="100" height="100" rx="24" fill="url(#grad1)" />
  <!-- Candlestick representation -->
  <rect x="30" y="30" width="8" height="40" fill="#ffffff" opacity="0.9" rx="1" />
  <rect x="33" y="25" width="2" height="5" fill="#ffffff" opacity="0.9" />
  <rect x="33" y="70" width="2" height="5" fill="#ffffff" opacity="0.9" />
  
  <rect x="46" y="20" width="8" height="35" fill="white" rx="1" />
  <rect x="49" y="15" width="2" height="5" fill="white" />
  <rect x="49" y="55" width="2" height="5" fill="white" />
  
  <rect x="62" y="40" width="8" height="30" fill="#ffffff" opacity="0.9" rx="1" />
  <rect x="65" y="35" width="2" height="5" fill="#ffffff" opacity="0.9" />
  <rect x="65" y="70" width="2" height="5" fill="#ffffff" opacity="0.9" />

  <!-- Magnifying glass overlay -->
  <circle cx="70" cy="70" r="15" fill="none" stroke="white" stroke-width="4" />
  <line x1="80" y1="80" x2="90" y2="90" stroke="white" stroke-width="6" stroke-linecap="round" />
